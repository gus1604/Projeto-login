<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <link rel="stylesheet" href="styles/style.css">
    <link rel="stylesheet" href="/styles/media-query.css">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Icons" />
</head>
<body>
    <main>
        <section id="login">
            <div id="imagem">
            </div>
            
            <div id="formulario">
                <h1>Login</h1>
                <p>Seja bem-vindo(a) novamente. Faça login para acessar sua conta e poder fazer as configuraões no seu ambiente.</p>
                <form autocomplete="on" action="login.php" method="post">
                    <div class="campo">
                        <i class="material-icons">person</i>
                        <input required maxlength="30" autocomplete="email" placeholder="Seu email" type="email" name="email" id="ilogin">
                        <label for="ilogin">Login</label>
                    </div>
                    <div class="campo">
                        <i class="material-icons">vpn_key</i>
                        <input required minlength="8" maxlength="20" autocomplete="current-password" placeholder="Sua senha" type="password" name="senha" id="isenha">
                        <label for="isenha">Senha</label>
                    </div>
                    <input type="submit" value="Entrar">
                    <a class="botao" href="esqueci.html">Esquecia a senha <i class="material-icons">mail</i></a>
                </form>
            </div>
        </section>
    </main>
</body>
</html>
